<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LD Radar Monitor</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/canvas.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="header-left">
                <h1 class="logo">LD Radar Monitor</h1>
                <span class="version">v1.0</span>
            </div>
            <div class="header-right">
                <select id="mountMode" class="select">
                    <option value="side">侧装</option>
                    <option value="ceiling">顶装</option>
                </select>
                <button id="btnSettings" class="btn btn-icon" title="设置">⚙</button>
                <button id="btnLogs" class="btn btn-icon" title="日志">📋</button>
                <button id="btnHelp" class="btn btn-icon" title="帮助">?</button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 雷达画布 -->
            <div class="canvas-container">
                <canvas id="radarCanvas" width="800" height="600"></canvas>
                <div class="canvas-overlay">
                    <div class="radar-info">
                        <span class="radar-position">雷达位置</span>
                        <span class="radar-direction">→</span>
                    </div>
                </div>
            </div>

            <!-- 侧边信息面板 -->
            <aside class="sidebar">
                <!-- 目标列表 -->
                <div class="panel">
                    <h3 class="panel-title">目标列表</h3>
                    <div id="targetList" class="target-list">
                        <div class="target-item empty">等待数据...</div>
                    </div>
                </div>

                <!-- 系统信息 -->
                <div class="panel">
                    <h3 class="panel-title">系统信息</h3>
                    <div class="info-list">
                        <div class="info-item">
                            <span class="info-label">雷达类型:</span>
                            <span id="radarType" class="info-value">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">波特率:</span>
                            <span id="baudRate" class="info-value">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">目标数:</span>
                            <span id="targetCount" class="info-value">0</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">安装模式:</span>
                            <span id="installMode" class="info-value">侧装</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">运行时间:</span>
                            <span id="uptime" class="info-value">00:00:00</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">内存:</span>
                            <span id="memory" class="info-value">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">WiFi:</span>
                            <span id="wifiRssi" class="info-value">-</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <!-- 底部状态栏 -->
        <footer class="footer">
            <div class="status-left">
                <span id="connectionStatus" class="status-item status-disconnected">未连接</span>
                <span class="status-separator">|</span>
                <span id="frameRate" class="status-item">帧率: - fps</span>
                <span class="status-separator">|</span>
                <span id="latency" class="status-item">延迟: - ms</span>
                <span class="status-separator">|</span>
                <span id="coordinates" class="status-item">X: - Y: -</span>
            </div>
            <div class="status-right">
                <span class="status-item">版本: v1.0</span>
            </div>
        </footer>
    </div>

    <!-- 设置面板 (默认隐藏) -->
    <div id="settingsPanel" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button id="btnCloseSettings" class="btn-close">×</button>
            </div>
            <div class="modal-body">
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="radar">雷达</button>
                    <button class="tab-btn" data-tab="display">显示</button>
                    <button class="tab-btn" data-tab="network">网络</button>
                </div>
                <div class="tab-content">
                    <div id="tab-radar" class="tab-pane active">
                        <div class="form-group">
                            <label>雷达类型</label>
                            <select id="settingRadarType" class="form-control">
                                <option value="LD2460">LD2460</option>
                                <option value="LD2450">LD2450</option>
                                <option value="LD2452">LD2452</option>
                                <option value="LD2461">LD2461</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>波特率</label>
                            <select id="settingBaudRate" class="form-control">
                                <option value="9600">9600</option>
                                <option value="115200">115200</option>
                                <option value="256000">256000</option>
                            </select>
                        </div>
                    </div>
                    <div id="tab-display" class="tab-pane">
                        <div class="form-group">
                            <label>网格大小 (米)</label>
                            <input type="number" id="settingGridSize" class="form-control" value="0.5" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>轨迹长度 (秒)</label>
                            <input type="number" id="settingTrailLength" class="form-control" value="60" min="10" max="300">
                        </div>
                        <div class="form-group checkbox">
                            <label><input type="checkbox" id="settingShowGrid" checked> 显示网格</label>
                        </div>
                        <div class="form-group checkbox">
                            <label><input type="checkbox" id="settingShowTrail" checked> 显示轨迹</label>
                        </div>
                    </div>
                    <div id="tab-network" class="tab-pane">
                        <div class="form-group">
                            <label>WiFi 模式</label>
                            <select id="settingWifiMode" class="form-control">
                                <option value="ap">AP 模式</option>
                                <option value="sta">STA 模式</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btnSaveSettings" class="btn btn-primary">保存</button>
                <button id="btnCancelSettings" class="btn">取消</button>
            </div>
        </div>
    </div>

    <!-- 日志面板 (默认隐藏) -->
    <div id="logsPanel" class="modal hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>系统日志</h2>
                <button id="btnCloseLogs" class="btn-close">×</button>
            </div>
            <div class="modal-body">
                <div class="log-toolbar">
                    <button id="btnRefreshLogs" class="btn">刷新</button>
                    <button id="btnDownloadLogs" class="btn">下载</button>
                    <button id="btnClearLogs" class="btn btn-danger">清空</button>
                </div>
                <div id="logContent" class="log-content">
                    <pre>等待加载日志...</pre>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/websocket.js"></script>
    <script src="/js/radar-canvas.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
