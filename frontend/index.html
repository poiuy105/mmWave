<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LD Radar Monitor</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="header-left">
                <h1 class="logo">LD Radar Monitor</h1>
                <span class="version">v2.0</span>
            </div>
            <div class="header-right">
                <div id="wsStatus" class="ws-status disconnected" title="WebSocket 连接状态">
                    <span class="ws-dot"></span>
                    <span class="ws-text">未连接</span>
                </div>
                <select id="mountMode" class="select" title="安装模式">
                    <option value="side">侧装</option>
                    <option value="ceiling">顶装</option>
                </select>
                <button id="btnSettings" class="btn btn-icon" title="设置">⚙</button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 雷达画布 -->
            <div class="canvas-container">
                <canvas id="radarCanvas"></canvas>
                <!-- 画布左下角雷达信息 -->
                <div class="canvas-overlay bottom-left">
                    <span class="radar-label">RADAR</span>
                    <span class="radar-direction" id="radarDirection">↑ 正前方</span>
                </div>
                <!-- 画布右上角统计信息 -->
                <div class="canvas-overlay top-right" id="statsOverlay">
                    <div class="stats-row"><span>目标数</span><span id="statTargets">0</span></div>
                    <div class="stats-row"><span>帧率</span><span id="statFps">- fps</span></div>
                    <div class="stats-row"><span>延迟</span><span id="statLatency">- ms</span></div>
                </div>
            </div>

            <!-- 侧边信息面板 -->
            <aside class="sidebar">
                <!-- 目标列表 -->
                <div class="panel">
                    <h3 class="panel-title">目标列表</h3>
                    <div id="targetList" class="target-list">
                        <div class="target-item empty">等待数据...</div>
                    </div>
                </div>

                <!-- 检测区域 -->
                <div class="panel">
                    <h3 class="panel-title">检测区域</h3>
                    <div id="zoneList" class="zone-list">
                        <div class="zone-item empty">暂无区域</div>
                    </div>
                    <button id="btnAddZone" class="btn btn-primary" style="width:100%;margin-top:8px">
                        + 新建区域
                    </button>
                </div>

                <!-- 系统信息 -->
                <div class="panel">
                    <h3 class="panel-title">系统信息</h3>
                    <div class="info-list">
                        <div class="info-item">
                            <span class="info-label">雷达类型:</span>
                            <span id="radarType" class="info-value">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">目标数:</span>
                            <span id="targetCount" class="info-value">0</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">安装模式:</span>
                            <span id="installMode" class="info-value">侧装</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">运行时间:</span>
                            <span id="uptime" class="info-value">00:00:00</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">内存:</span>
                            <span id="memory" class="info-value">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">帧计数:</span>
                            <span id="frameCount" class="info-value">-</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <!-- 底部状态栏 -->
        <footer class="footer">
            <div class="status-left">
                <span id="connectionStatus" class="status-item status-disconnected">● 未连接</span>
                <span class="status-separator">|</span>
                <span id="frameRate" class="status-item">帧率: - fps</span>
                <span class="status-separator">|</span>
                <span id="latency" class="status-item">延迟: - ms</span>
                <span class="status-separator">|</span>
                <span id="coordinates" class="status-item">X: - Y: -</span>
            </div>
            <div class="status-right">
                <span id="simMode" class="status-item status-sim hidden">模拟数据</span>
                <span class="status-item">v2.0</span>
            </div>
        </footer>
    </div>

    <!-- 设置面板 -->
    <div id="settingsPanel" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button id="btnCloseSettings" class="btn-close">×</button>
            </div>
            <div class="modal-body">
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="radar">雷达</button>
                    <button class="tab-btn" data-tab="display">显示</button>
                </div>
                <div class="tab-content">
                    <div id="tab-radar" class="tab-pane active">
                        <div class="form-group">
                            <label>安装模式</label>
                            <select id="settingMountMode" class="form-control">
                                <option value="side">侧装</option>
                                <option value="ceiling">顶装</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>检测距离 (米)</label>
                            <input type="number" id="settingDistance" class="form-control" value="6.0" step="0.5" min="0.5" max="12">
                        </div>
                        <div class="form-group">
                            <label>安装高度 (米)</label>
                            <input type="number" id="settingHeight" class="form-control" value="2.5" step="0.1" min="0.5" max="5">
                        </div>
                        <div class="form-group">
                            <label>安装角度 (度)</label>
                            <input type="number" id="settingAngle" class="form-control" value="0" step="5" min="-90" max="90">
                        </div>
                    </div>
                    <div id="tab-display" class="tab-pane">
                        <div class="form-group">
                            <label>网格大小 (米)</label>
                            <input type="number" id="settingGridSize" class="form-control" value="0.5" step="0.1" min="0.1" max="2">
                        </div>
                        <div class="form-group">
                            <label>轨迹长度 (帧)</label>
                            <input type="number" id="settingTrailLength" class="form-control" value="60" min="0" max="300">
                        </div>
                        <div class="form-group checkbox">
                            <label><input type="checkbox" id="settingShowGrid" checked> 显示网格</label>
                        </div>
                        <div class="form-group checkbox">
                            <label><input type="checkbox" id="settingShowTrail" checked> 显示轨迹</label>
                        </div>
                        <hr style="margin: 16px 0; border: none; border-top: 1px solid #e5e7eb;">
                        <h4 style="margin-bottom: 12px; color: #374151;">视图控制</h4>
                        <div class="form-group">
                            <label>旋转角度 (度)</label>
                            <input type="range" id="settingRotation" class="form-control" value="0" step="5" min="-180" max="180">
                            <span id="rotationValue" style="font-size: 12px; color: #6b7280;">0°</span>
                        </div>
                        <div class="form-group">
                            <button id="btnSaveView" class="btn btn-primary" style="width: 100%;">
                                保存当前视图
                            </button>
                        </div>
                        <div class="form-group">
                            <button id="btnResetView" class="btn" style="width: 100%;">
                                重置视图
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btnSaveSettings" class="btn btn-primary">保存</button>
                <button id="btnCancelSettings" class="btn">取消</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- JS 加载顺序：底层工具 → 通信层 → 数据层 → 渲染层 → 应用层 -->
    <script src="./websocket.js"></script>
    <script src="./api.js"></script>
    <script src="./zone.js"></script>
    <script src="./radar.js"></script>
    <script src="./canvas.js"></script>
    <script src="./zone-editor.js"></script>
    <script src="./main.js"></script>
</body>
</html>
